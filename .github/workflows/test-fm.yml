name: Test FM access from public IP

# Manually triggered diagnostic. Runs the same FM session-create call that the
# Cloudflare Pages build makes, from a GitHub-hosted runner, so we can compare
# behavior across origins. Delete this workflow once the access question is
# resolved.

on:
  workflow_dispatch:

jobs:
  hit-fm:
    runs-on: ubuntu-latest
    steps:
      - name: Show runner public IP
        run: |
          echo "Runner egress IP:"
          curl -sS https://api.ipify.org
          echo

      - name: Hit FM session endpoint
        env:
          FM_HOST: ${{ secrets.FM_HOST }}
          FM_DB: ${{ secrets.FM_DB }}
          FM_USER: ${{ secrets.FM_USER }}
          FM_PASS: ${{ secrets.FM_PASS }}
        run: |
          set +e  # don't fail on non-2xx, we want to see the response
          DB_ENC=$(node -e "console.log(encodeURIComponent(process.env.FM_DB))")
          URL="https://${FM_HOST}/fmi/data/vLatest/databases/${DB_ENC}/sessions"
          echo "URL: $URL"
          echo
          echo "--- Response (no User-Agent override) ---"
          curl -sS -o /tmp/r1.json -w "HTTP %{http_code}\n" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -u "${FM_USER}:${FM_PASS}" \
            -d '{}'
          cat /tmp/r1.json | head -c 500
          echo
          echo
          echo "--- Response (curl-default User-Agent removed) ---"
          curl -sS -o /tmp/r2.json -w "HTTP %{http_code}\n" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: " \
            -u "${FM_USER}:${FM_PASS}" \
            -d '{}'
          cat /tmp/r2.json | head -c 500
          echo
          echo
          echo "--- Response (browser-like User-Agent) ---"
          curl -sS -o /tmp/r3.json -w "HTTP %{http_code}\n" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            -u "${FM_USER}:${FM_PASS}" \
            -d '{}'
          cat /tmp/r3.json | head -c 500
          echo
          echo
          echo "--- Response (CF Workers-style headers) ---"
          # Simulate what Miniflare's fetch attaches when a Worker calls out.
          # If FM's proxy filters on any of these, this should reproduce the 500.
          curl -sS -o /tmp/r4.json -w "HTTP %{http_code}\n" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Cloudflare-Workers" \
            -H "CF-Connecting-IP: 1.2.3.4" \
            -H "CF-Ray: aabbccdd0011-AMS" \
            -H "CF-Visitor: {\"scheme\":\"https\"}" \
            -H "CF-Worker: ninetone-refresh-preview" \
            -u "${FM_USER}:${FM_PASS}" \
            -d '{}'
          cat /tmp/r4.json | head -c 500
          echo
          echo
          echo "--- Response (Origin: ninetone.com) ---"
          # Test the CORS-ish theory directly: does FM's proxy treat the request
          # differently when an Origin header is set?
          curl -sS -o /tmp/r5.json -w "HTTP %{http_code}\n" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "Origin: https://ninetone-refresh-preview.pages.dev" \
            -u "${FM_USER}:${FM_PASS}" \
            -d '{}'
          cat /tmp/r5.json | head -c 500
          echo
          echo
          echo "--- Response (Origin: pages.dev + CF headers combined) ---"
          curl -sS -o /tmp/r6.json -w "HTTP %{http_code}\n" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Cloudflare-Workers" \
            -H "CF-Worker: ninetone-refresh-preview" \
            -H "Origin: https://ninetone-refresh-preview.pages.dev" \
            -u "${FM_USER}:${FM_PASS}" \
            -d '{}'
          cat /tmp/r6.json | head -c 500
          echo
